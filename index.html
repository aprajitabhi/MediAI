<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MediAI - AI Smart Hospital Assistant Presentation</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        :root {
            --primary: #007bff;
            --primary-dark: #0056b3;
            --secondary: #00d2d3;
            --accent: #ff6b6b;
            --text-dark: #2d3436;
            --text-light: #636e72;
            --bg-light: #f4f7f6;
            --white: #ffffff;
            --glass: rgba(255, 255, 255, 0.95);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --radius: 16px;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: linear-gradient(135deg, #e0f7fa 0%, #e8f5e9 100%);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden; /* Prevents body scroll */
            color: var(--text-dark);
            position: relative;
        }

        /* Animated Background Particles */
        .bg-shape {
            position: absolute;
            filter: blur(80px);
            z-index: -1;
            opacity: 0.6;
            animation: float 10s infinite ease-in-out;
        }
        .shape-1 { top: -10%; left: -10%; width: 500px; height: 500px; background: var(--primary); border-radius: 50%; }
        .shape-2 { bottom: -10%; right: -10%; width: 400px; height: 400px; background: var(--secondary); border-radius: 50%; animation-delay: 2s; }
        .shape-3 { top: 40%; left: 40%; width: 300px; height: 300px; background: #a29bfe; border-radius: 50%; animation-delay: 4s; }

        @keyframes float {
            0%, 100% { transform: translate(0, 0); }
            50% { transform: translate(20px, -20px); }
        }

        /* Welcome Slide Animation */
        @keyframes heartbeat {
            0% { transform: scale(1); }
            15% { transform: scale(1.15); }
            30% { transform: scale(1); }
            45% { transform: scale(1.15); }
            60% { transform: scale(1); }
            100% { transform: scale(1); }
        }

        /* Main Container - Full Screen */
        #presentation-container {
            width: 95vw;
            height: 96vh;
            background: var(--glass);
            backdrop-filter: blur(10px);
            border-radius: var(--radius);
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            position: relative;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.5);
        }

        /* Header / Progress Bar */
        header {
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(0,0,0,0.05);
            background: rgba(255,255,255,0.5);
            flex-shrink: 0;
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .progress-container {
            flex-grow: 1;
            margin: 0 40px;
            height: 6px;
            background: rgba(0,0,0,0.1);
            border-radius: 10px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background: linear-gradient(90deg, var(--primary), var(--secondary));
            width: 0%;
            transition: width 0.5s ease;
        }

        /* Slide Area */
        main {
            flex: 1;
            position: relative;
            padding: 15px 40px; /* Reduced vertical padding */
            overflow: hidden; 
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Slide Styling */
        .slide {
            display: none;
            width: 100%;
            height: 100%;
            flex-direction: column;
            animation: fadeIn 0.6s cubic-bezier(0.22, 1, 0.36, 1);
        }

        .slide.active {
            display: flex;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* Typography */
        h1, h2, h3 { color: var(--text-dark); margin-bottom: 0.8rem; }
        h1 { font-size: 2.8rem; background: -webkit-linear-gradient(45deg, var(--primary), var(--secondary)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        h2 { font-size: 2rem; border-left: 5px solid var(--primary); padding-left: 15px; }
        h3 { font-size: 1.4rem; color: var(--primary); }
        p, li { font-size: 1rem; color: var(--text-light); line-height: 1.5; margin-bottom: 6px; }
        ul { margin-left: 20px; }
        .tagline { font-style: italic; font-weight: 300; font-size: 1.2rem; color: var(--text-light); margin-top: 10px; }
        .highlight { color: var(--primary); font-weight: 600; }
        .conclusion-box {
            background: rgba(0, 123, 255, 0.1);
            padding: 15px;
            border-radius: 10px;
            border-left: 5px solid var(--primary);
            margin-top: 10px;
        }

        /* Grid Layouts */
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 20px; height: 100%; }
        .grid-3 { display: grid; grid-template-columns: repeat(3, 1fr); gap: 15px; }
        .grid-4 { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; }

        /* Cards */
        .card {
            background: white;
            padding: 15px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
            transition: transform 0.3s;
            border-top: 4px solid transparent;
        }
        .card:hover { transform: translateY(-5px); border-top-color: var(--secondary); }
        .card i { font-size: 1.8rem; color: var(--primary); margin-bottom: 10px; }
        .card h4 { margin-bottom: 8px; font-size: 1.1rem; }

        /* Specific Slide Styles */
        .title-slide { text-align: center; justify-content: center; }
        .team-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 10px; margin-top: 20px; width: 100%; }
        .team-member { background: white; padding: 10px; border-radius: 8px; font-size: 0.85rem; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .team-name { font-weight: bold; color: var(--primary); display: block; }
        .team-id { font-size: 0.8rem; color: #888; }
        
        /* Slide 5: Process */
        .process-step {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
            position: relative;
            background: white;
            padding: 10px;
            border-radius: 10px;
            height: 100%;
            justify-content: center;
        }
        .step-num { 
            background: var(--primary); color: white; width: 28px; height: 28px; 
            border-radius: 50%; display: flex; align-items: center; justify-content: center; 
            margin-bottom: 8px; font-weight: bold; font-size: 0.9rem; flex-shrink: 0;
        }
        .process-arrow { align-self: center; color: var(--secondary); font-size: 1.2rem; }

        /* Slide 7: Interactive Symptom Checker */
        .demo-interface {
            background: white;
            padding: 10px; /* Reduced padding */
            border-radius: 15px;
            box-shadow: 0 5px 20px rgba(0,0,0,0.08);
            max-width: 500px;
            margin: 0 auto;
            text-align: center;
        }
        .input-group { display: flex; gap: 8px; margin: 10px 0; }
        input[type="text"] {
            flex: 1; padding: 8px 10px; border: 2px solid #eee; border-radius: 8px; outline: none; transition: 0.3s; font-size: 0.9rem;
        }
        input[type="text"]:focus { border-color: var(--primary); }
        .btn {
            padding: 8px 15px; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; transition: 0.3s; font-size: 0.9rem;
        }
        .btn-primary { background: var(--primary); color: white; }
        .btn-primary:hover { background: var(--primary-dark); }
        
        /* Fixed CSS for Result Box */
        .analysis-result { 
            margin-top: 10px; 
            padding: 10px; 
            background: #ffffff; 
            border-radius: 8px; 
            border: 1px solid #e0e0e0; 
            border-left: 5px solid var(--primary); 
            text-align: left; 
            display: none; 
            font-size: 0.9rem; /* Slightly smaller font */
            color: var(--text-dark); 
            box-shadow: 0 4px 15px rgba(0,0,0,0.05);
        }
        .analysis-result strong {
            color: var(--text-dark);
            display: block;
            margin-bottom: 4px;
            font-size: 0.95rem;
        }

        .examples-text {
            font-size: 0.75rem; color: #999; margin-top: 5px; font-style: italic;
        }

        /* Slide 11: Table */
        table { width: 100%; border-collapse: collapse; background: white; border-radius: 10px; overflow: hidden; box-shadow: 0 4px 10px rgba(0,0,0,0.05); font-size: 0.95rem; }
        th, td { padding: 10px 15px; text-align: left; border-bottom: 1px solid #eee; }
        th { background: var(--primary); color: white; font-size: 0.9rem; }
        tr:last-child td { border-bottom: none; }
        tr:hover { background: #f9f9f9; }

        /* Slide 12: Comparison */
        .comparison-table { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; }
        .comp-col { padding: 15px; border-radius: 10px; }
        .comp-old { background: #ffebee; }
        .comp-new { background: #e8f5e9; border: 2px solid var(--primary); }
        .comp-item { margin-bottom: 8px; display: flex; align-items: center; gap: 10px; font-size: 0.95rem; }
        .comp-item i { width: 20px; }

        /* Navigation Controls */
        .nav-controls {
            padding: 10px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: white;
            border-top: 1px solid #eee;
            flex-shrink: 0;
        }

        .nav-btn {
            background: transparent;
            border: 2px solid #eee;
            color: var(--text-dark);
            padding: 8px 15px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.3s;
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 0.9rem;
        }

        .nav-btn:hover { border-color: var(--primary); color: var(--primary); background: rgba(0,123,255,0.05); }
        .nav-btn:disabled { opacity: 0.3; cursor: not-allowed; border-color: #eee; color: #ccc; }

        /* Toast Notification */
        #toast {
            visibility: hidden;
            min-width: 250px;
            background-color: #333;
            color: #fff;
            text-align: center;
            border-radius: 8px;
            padding: 16px;
            position: fixed;
            z-index: 1000;
            left: 50%;
            bottom: 80px;
            transform: translateX(-50%);
            font-size: 0.9rem;
            opacity: 0;
            transition: opacity 0.5s, bottom 0.5s;
        }
        #toast.show { visibility: visible; opacity: 1; bottom: 100px; }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0.7); }
            70% { box-shadow: 0 0 0 15px rgba(255, 107, 107, 0); }
            100% { box-shadow: 0 0 0 0 rgba(255, 107, 107, 0); }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .grid-2, .grid-3, .grid-4, .comparison-table { grid-template-columns: 1fr; }
            h1 { font-size: 2rem; }
            h2 { font-size: 1.5rem; }
            .nav-controls { padding: 15px; }
            #presentation-container { width: 100%; height: 100vh; border-radius: 0; }
            main { padding: 20px; }
            .team-grid { grid-template-columns: 1fr 1fr; }
        }
    </style>
</head>
<body>

    <!-- Background Shapes -->
    <div class="bg-shape shape-1"></div>
    <div class="bg-shape shape-2"></div>
    <div class="bg-shape shape-3"></div>

    <div id="presentation-container">

        <main id="slideContent">

        <div class="nav-controls">

            <span id="slideIndicator" style="font-weight:600; color: var(--text-light); font-size: 0.9rem;">1 / 14</span>
            <button class="nav-btn" id="nextBtn" onclick="changeSlide(1)">Next <i class="fa-solid fa-arrow-right"></i></button>
        </div>
    </div>

    <!-- Toast Notification -->
    <div id="toast">Message here</div>

    <script>
        // Data Structure for all slides
        const slides = [
            {

        const mainContent = document.getElementById('slideContent');
        const progressBar = document.getElementById('progressBar');
        const slideIndicator = document.getElementById('slideIndicator');
        const prevBtn = document.getElementById('prevBtn');
        const nextBtn = document.getElementById('nextBtn');

        // Function to render a slide based on its type
        function renderSlide(index) {
            const data = slides[index];
            let html = '';

            if (data.type === 'title') {
                html = `
                    <div class="slide active title-slide">
                        <h1 style="font-size: 3.5rem; margin-bottom: 10px;">${data.title}</h1>
                        <h2 style="border:none; padding:0; font-size: 1.8rem; margin-bottom: 20px; color: var(--primary-dark);">${data.subtitle}</h2>

                        </div>
                    </div>
                `;
            } else if (data.type === 'list-grid') {
                html = `
                    <div class="slide active">

                        <h3>${data.subtitle}</h3>

                            <div style="display:flex; align-items:center; justify-content:center; flex-direction:column;">
                                <i class="fa-solid fa-hospital-user" style="font-size:8rem; color:#ddd;"></i>
                            </div>
                        </div>

                                <p>${data.contentLeft}</p>
                                <div class="conclusion-box" style="margin-top:20px;">

                        <h2>${data.title}</h2>
                        <h3>${data.subtitle}</h3>
                        <div class="grid-3" style="margin-top:20px; align-content:center;">
                            ${data.steps.map((step, i) => `
                                <div style="display:flex; align-items:center;">
                                    <div class="process-step">
                                        <div class="step-num">${i + 1}</div>
                                        <p style="font-size:0.85rem; margin:0;">${step}</p>
                                    </div>
                                    ${i < data.steps.length - 1 ? '<i class="fa-solid fa-chevron-right process-arrow"></i>' : ''}
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (data.type === 'interactive-checker') {
                // Slide 7: Adjusted Layout for fit and internal scrolling
                html = `
                    <div class="slide active" style="overflow-y: auto; align-items: flex-start;">
                        <h2 style="margin-bottom: 5px; font-size: 1.8rem;">${data.title}</h2>
                        <h3 style="margin-bottom: 15px; font-size: 1.2rem;">${data.subtitle}</h3>
                        <div class="grid-2" style="align-items: flex-start; gap: 15px; height: auto;">
                            <div>
                                <p style="font-size: 0.9rem; margin-bottom: 10px;">${data.description}</p>
                                <div class="demo-interface">
                                    <h4 style="margin-bottom: 5px; font-size: 1.1rem;"><i class="fa-solid fa-user-doctor"></i> Try the Checker</h4>
                                    <div class="input-group">
                                        <input type="text" id="symptomInput" placeholder="Enter symptom...">
                                        <button class="btn btn-primary" onclick="analyzeSymptom()">Analyze</button>
                                    </div>
                                    <p class="examples-text">Try typing: Fever, Chest Pain, Cough, Headache, Nausea, Stomach Pain, Dizziness, Broken Bone...</p>
                                    
                                    <div id="resultBox" class="analysis-result">
                                        <strong><i class="fa-solid fa-bolt"></i> AI Analysis:</strong><br>
                                        Possible: <span class="highlight" id="resIllness">Viral Infection</span><br>
                                        Severity: <span class="highlight" id="resSeverity">Moderate</span><br>
                                        Dept: <span class="highlight" id="resDept">General Medicine</span>
                                    </div>
                                </div>
                            </div>
                            <ul style="font-size: 0.95rem; margin-top: 10px;">
                                ${data.benefits.map(b => `<li><i class="fa-solid fa-thumbs-up" style="color:var(--primary);"></i> ${b}</li>`).join('')}
                            </ul>
                        </div>
                    </div>
                `;
            } else if (data.type === 'split-feature') {
                html = `
                    <div class="slide active">
                        <h2>${data.title}</h2>
                        <div class="grid-2">
                            <div class="card">
                                <h3>${data.leftTitle}</h3>
                                <ul>${data.leftList.map(i => `<li>${i}</li>`).join('')}</ul>
                                ${data.leftDesc ? `<p>${data.leftDesc}</p>` : ''}
                                ${data.leftSub ? `<p style="font-style:italic; font-size:0.9rem;">${data.leftSub}</p>` : ''}
                            </div>
                            <div class="card" style="border-top-color: var(--accent);">
                                <h3>${data.rightTitle}</h3>
                                <p>${data.rightDesc || ''}</p>
                                <ul>${data.rightList ? data.rightList.map(i => `<li>${i}</li>`).join('') : ''}</ul>
                                ${data.rightBenefits ? `<p>${data.rightBenefits}</p>` : ''}
                                ${data.rightResult ? `<div class="conclusion-box" style="margin-top:10px; background: #ffebee; border-color:var(--accent);"><p style="margin:0; font-size:0.9rem;"><strong>Result:</strong> ${data.rightResult}</p></div>` : ''}
                            </div>
                        </div>
                    </div>
                `;
            } else if (data.type === 'tech-stack') {
                html = `
                    <div class="slide active">
                        <h2>${data.title}</h2>
                        <h3>${data.subtitle}</h3>
                        <div style="display:flex; flex-wrap:wrap; gap:10px; justify-content:center; margin-top:20px;">
                            ${data.techs.map(tech => `
                                <span style="background:white; padding:8px 15px; border-radius:30px; border:1px solid #eee; box-shadow:0 2px 5px rgba(0,0,0,0.05); font-weight:600; color:var(--primary); font-size:0.9rem;">
                                    <i class="fa-solid fa-microchip"></i> ${tech}
                                </span>
                            `).join('')}
                        </div>
                    </div>
                `;
            } else if (data.type === 'table') {
                html = `
                    <div class="slide active">
                        <h2>${data.title}</h2>
                        <h3>${data.subtitle}</h3>
                        <table style="margin-top:15px;">
                            <thead>
                                <tr>
                                    ${data.tableHeader.map(h => `<th>${h}</th>`).join('')}
                                </tr>
                            </thead>
                            <tbody>
                                ${data.tableData.map(row => `
                                    <tr>
                                        ${row.map(cell => `<td>${cell}</td>`).join('')}
                                    </tr>
                                `).join('')}
                            </tbody>
                        </table>
                        <p style="margin-top:10px; font-size:0.85rem;"><strong>Additional Revenue:</strong> ${data.extra}</p>
                    </div>
                `;
            } else if (data.type === 'comparison') {
                html = `
                    <div class="slide active">
                        <h2>${data.title}</h2>
                        <div class="grid-2">
                            <div>
                                <h3>Unique Selling Points (USP)</h3>
                                <div class="comparison-table">
                                    <div class="comp-col comp-old">
                                        <h4 style="text-align:center; margin-bottom:10px;">Traditional System</h4>
                                        ${data.comparisons.map(c => `<div class="comp-item"><i class="fa-solid fa-times" style="color:red;"></i> ${c.old}</div>`).join('')}
                                    </div>
                                    <div class="comp-col comp-new">
                                        <h4 style="text-align:center; margin-bottom:10px;">MediAI</h4>
                                        ${data.comparisons.map(c => `<div class="comp-item"><i class="fa-solid fa-check" style="color:green;"></i> ${c.new}</div>`).join('')}
                                    </div>
                                </div>
                            </div>
                            <div style="padding-left:15px; border-left:2px solid #eee;">
                                <h3>Future Scope</h3>
                                <p style="margin-bottom:10px;">Future upgrades may include:</p>
                                <ul>
                                    ${data.future.map(f => `<li>${f}</li>`).join('')}
                                </ul>
                            </div>
                        </div>
                    </div>
                `;
            } else if (data.type === 'conclusion') {
                html = `
                    <div class="slide active" style="text-align:center; justify-content:center; height: 100%;">
                        <h2>${data.title}</h2>
                        <p style="font-size:1rem; max-width:800px; margin:10px auto;">${data.text}</p>
                        
                        <div class="grid-4" style="margin:20px 0; gap: 10px;">
                            ${data.points.map(p => `<div class="card" style="background: white; color: black; border: 1px solid #eee; padding: 10px;"><h3 style="font-size:1.2rem; margin:0; color:var(--primary);">${p}</h3></div>`).join('')}
                        </div>
                        
                        <h1 class="tagline" style="color:var(--primary); font-size:1.5rem; margin-top: 20px;">${data.finalLine}</h1>
                    </div>
                `;
            } else if (data.type === 'thank-you') {
                html = `
                    <div class="slide active" style="text-align:center; justify-content:center;">
                        <i class="fa-solid fa-hand-sparkles" style="font-size:5rem; color:var(--secondary); margin-bottom:20px;"></i>
                        <h1 style="font-size:4rem;">${data.title}</h1>
                        <p>Any Questions?</p>
                    </div>
                `;
            }

            mainContent.innerHTML = html;
            updateProgress();
        }

        // Navigation Logic
        function changeSlide(direction) {
            const newIndex = currentSlide + direction;
            if (newIndex >= 0 && newIndex < slides.length) {
                currentSlide = newIndex;
                renderSlide(currentSlide);
            }
        }

        function updateProgress() {
            const percent = ((currentSlide + 1) / slides.length) * 100;
            progressBar.style.width = `${percent}%`;
            slideIndicator.innerText = `${currentSlide + 1} / ${slides.length}`;
            
            prevBtn.disabled = currentSlide === 0;
            nextBtn.disabled = currentSlide === slides.length - 1;
        }

        // Interactive Features Logic
        function showToast(message) {
            const toast = document.getElementById("toast");
            toast.className = "show";
            toast.innerText = message;
            setTimeout(function(){ toast.className = toast.className.replace("show", ""); }, 3000);
        }

        function analyzeSymptom() {
            const input = document.getElementById('symptomInput').value.toLowerCase();
            const resultBox = document.getElementById('resultBox');
            
            if(!input) {
                showToast("Please enter a symptom first.");
                return;
            }

            resultBox.style.display = 'none';
            
            // Simulate AI processing delay
            showToast("AI is analyzing symptoms...");
            
            setTimeout(() => {
                let illness = "Viral Infection";
                let severity = "Mild";
                let dept = "General Medicine";

                // Added more illness logic
                if (input.includes("pain") || input.includes("ache")) {
                    if (input.includes("stomach")) {
                        illness = "Gastritis / Infection";
                        severity = "Moderate";
                        dept = "Gastroenterology";
                    } else if (input.includes("head")) {
                        illness = "Migraine / Tension";
                        severity = "Mild to Moderate";
                        dept = "Neurology";
                    } else {
                        illness = "Muscle Strain / Injury";
                        severity = "Moderate";
                        dept = "Orthopedics";
                    }
                } else if (input.includes("fever")) {
                    illness = "Viral Fever";
                    severity = "Moderate";
                    dept = "General Medicine";
                } else if (input.includes("breath") || input.includes("chest")) {
                    illness = "Cardiac / Respiratory Issue";
                    severity = "Critical";
                    dept = "Emergency / Cardiology";
                } else if (input.includes("cough") || input.includes("cold")) {
                    illness = "Respiratory Infection / Flu";
                    severity = "Moderate";
                    dept = "Pulmonology";
                } else if (input.includes("nausea") || input.includes("vomit")) {
                    illness = "Digestive Tract Issue";
                    severity = "Moderate";
                    dept = "Gastroenterology";
                } else if (input.includes("dizzy") || input.includes("faint")) {
                    illness = "Blood Pressure / Neuro Issue";
                    severity = "High";
                    dept = "Neurology / General Medicine";
                } else if (input.includes("broken") || input.includes("fracture")) {
                    illness = "Bone Fracture / Trauma";
                    severity = "Critical";
                    dept = "Orthopedics / Emergency";
                }

                document.getElementById('resIllness').innerText = illness;
                document.getElementById('resSeverity').innerText = severity;
                document.getElementById('resSeverity').style.color = severity === "Critical" ? "red" : "inherit";
                document.getElementById('resDept').innerText = dept;

                resultBox.style.display = 'block';
                resultBox.style.animation = "fadeIn 0.5s";
            }, 1000);
        }

        // Global listener for keyboard navigation
        document.addEventListener('keydown', (e) => {
            if (e.key === 'ArrowRight') changeSlide(1);
            if (e.key === 'ArrowLeft') changeSlide(-1);
        });

        // Initialize
        renderSlide(0);

    </script>
</body>
</html>
